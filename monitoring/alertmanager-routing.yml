# monitoring/alertmanager-routing.yml
#
# Production Alertmanager configuration. Routes alerts to PagerDuty
# (severity=page), Slack (severity=warn), and email (default). The
# receivers pull their endpoints from environment variables; provide
# them via the docker-compose `environment:` block or, in a real cluster,
# via the SecretStore and external-secrets-operator (see k8s/external-secret.yaml).
#
# Differences from monitoring/alertmanager.yml:
#   - Adds explicit receivers per severity (pagerduty, slack-page, slack-warn, email)
#   - Uses inhibition rules so a `BackendDown` alert silences the
#     downstream `BackendHigh5xxRate` / `BackendHighP99Latency` family
#   - Time-interval `business_hours` to mute non-page alerts outside
#     business hours
#   - Templated Slack message includes the dashboard link and the
#     description annotation

global:
  resolve_timeout: 5m
  slack_api_url: ${SLACK_WEBHOOK_URL}
  pagerduty_url: https://events.pagerduty.com/v2/enqueue

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: default
  group_by: [alertname, severity, route]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "page"
      receiver: pagerduty
      group_wait: 10s
      repeat_interval: 1h
      continue: true
    - matchers:
        - severity = "page"
      receiver: slack-page
    - matchers:
        - severity = "warn"
      receiver: slack-warn
      active_time_intervals:
        - business_hours
    - matchers:
        - alertname = "BackendDown"
      receiver: pagerduty
      repeat_interval: 5m

inhibit_rules:
  - source_matchers:
      - alertname = "BackendDown"
    target_matchers:
      - severity = "warn"
    equal: [route]

receivers:
  - name: default
    email_configs:
      - to: alerts@indigopay.app
        send_resolved: true
  - name: pagerduty
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_ROUTING_KEY}
        send_resolved: true
        description: "{{ .CommonAnnotations.summary }}"
  - name: slack-page
    slack_configs:
      - channel: "#indigopay-page"
        send_resolved: true
        title: "đźš¨ {{ .CommonLabels.alertname }}"
        text: "*{{ .CommonAnnotations.summary }}*\n{{ .CommonAnnotations.description }}\nDashboard: https://grafana.indigopay.app/d/indigopay-backend"
  - name: slack-warn
    slack_configs:
      - channel: "#indigopay-warn"
        send_resolved: true
        title: "âš ď¸Ź {{ .CommonLabels.alertname }}"
        text: "*{{ .CommonAnnotations.summary }}*\n{{ .CommonAnnotations.description }}"

time_intervals:
  - name: business_hours
    time_intervals:
      - weekdays: ["monday:friday"]
        times:
          - "09:00-18:00"
