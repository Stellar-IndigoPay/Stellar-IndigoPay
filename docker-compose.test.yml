version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stellar_indigopay_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stellar_indigopay_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:stable
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "127.0.0.1:3310"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    environment:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/stellar_indigopay_test
      REDIS_URL: redis://redis:6379
      STELLAR_NETWORK: testnet
      HORIZON_URL: https://horizon-testnet.stellar.org
      ALLOWED_ORIGINS: http://localhost:3000
      CLAMD_HOST: clamav
      CLAMD_PORT: 3310
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    command: npm test
