name: Contracts CI

on:
  push:
    branches: [main, develop]
    paths: [contracts/**]
  pull_request:
    paths: [contracts/**]
  workflow_dispatch:

jobs:
  test:
    name: Soroban Contracts (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests (skip duplicate fuzz run -- handled by dedicated fuzz job)
        run: "cargo test --features testutils --workspace -- --skip fuzz::"

      - name: Build WASM
        run: cargo build --workspace --target wasm32v1-none --release

  fuzz:
    name: Fuzz Tests (10k iterations)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Run fuzz tests (1.5k iterations)
        run: cargo test --features testutils -- fuzz
        env:
          FUZZ_ITERATIONS: 1500

  coverage:
    name: Coverage (tarpaulin)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: llvm-tools-preview

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Run coverage
        run: cargo tarpaulin --config indigopay-contract/.tarpaulin.toml --out Html --out Lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: contracts/indigopay-contract/coverage/

  upgrade-integration:
    name: Contract Upgrade Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32v1-none
      - name: Build v1 and v2 WASM fixtures
        run: |
          cd contracts
          mkdir -p tests/fixtures
          cargo build --package indigopay-contract --features v1 --target wasm32v1-none --release
          cp target/wasm32v1-none/release/indigopay_contract.wasm tests/fixtures/v1.wasm
          cargo build --package indigopay-contract-v2 --target wasm32v1-none --release
          cp target/wasm32v1-none/release/indigopay_contract_v2.wasm tests/fixtures/v2.wasm
      - name: Run upgrade integration tests
        run: |
          cd contracts
          cargo test --package indigopay-contract --test upgrade_test --features testutils -- --nocapture
