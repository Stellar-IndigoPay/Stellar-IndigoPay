# .github/workflows/image-scan.yml
#
# Trivy image scan for backend and frontend Docker images. Runs after
# the CI build (or directly on main pushes). Fails the build on
# CRITICAL or HIGH vulnerabilities with a known fix. Tolerates
# MEDIUM and LOW.
#
# Uses aquasecurity/trivy-action which caches the vuln DB between
# runs to keep CI fast.

name: Image Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  scan:
    name: Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t indigopay-${{ matrix.service }}:scan \
            ./${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        # Pinned to a commit SHA for supply-chain hygiene. Update by
        # following the action's release notes and running
        #   git ls-remote https://github.com/aquasecurity/trivy-action refs/tags/v0.24.0
        # to find the SHA, then replacing the value below.
        uses: aquasecurity/trivy-action@b6643c0e5cc8a9c9b5b2cb06a73c4a3d9eb7c5d2
        with:
          image-ref: indigopay-${{ matrix.service }}:scan
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
