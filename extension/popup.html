<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IndigoPay</title>
    <link rel="stylesheet" href="popup.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="glass-panel">
        <div class="header-top">
          <h1 class="logo">🌿 IndigoPay</h1>
          <div class="header-actions">
            <span id="network-badge" class="network-badge network-badge-testnet"
              >Testnet</span
            >
            <button id="connect-btn" class="btn glow-btn">
              Connect Wallet
            </button>
            <button
              id="settings-btn"
              class="btn settings-icon-btn"
              title="Settings"
              aria-label="Open settings"
            >
              ⚙️
            </button>
          </div>
        </div>
        <div id="wallet-info" class="wallet-info hidden">
          <div class="address-badge">
            <span class="dot online"></span>
            <span id="wallet-address">--</span>
          </div>
          <h2 id="wallet-balance" class="balance-text">0.00 XLM</h2>
        </div>
      </header>

      <!-- Top Projects -->
      <main>
        <div class="section-header">
          <h3>Top Saved Projects</h3>
          <span class="badge">3</span>
        </div>

        <!-- Project Search -->
        <div class="search-wrapper" id="search-wrapper">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="project-search"
            class="search-input"
            placeholder="Search projects…"
            autocomplete="off"
            aria-label="Search projects"
          />
          <ul id="search-dropdown" class="search-dropdown hidden"></ul>
        </div>

        <ul
          id="project-list"
          class="project-list"
          role="listbox"
          aria-label="Saved projects"
        >
          <!-- Skeleton Loader -->
          <li class="glass-panel project-item skeleton">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line sh"></div>
              <div class="skeleton-line sl"></div>
            </div>
          </li>
        </ul>

        <!-- Donation Form -->
        <form
          id="donation-form"
          class="glass-panel donate-section"
          novalidate
          aria-label="Donation form"
        >
          <h3>Quick Donate</h3>
          <p class="subtitle">Send XLM directly from your connected wallet.</p>

          <div class="form-field">
            <label for="source-address" class="form-label">Source (your wallet)</label>
            <input
              type="text"
              id="source-address"
              class="settings-input"
              placeholder="G... (auto-filled on connect)"
              autocomplete="off"
              spellcheck="false"
              readonly
            />
          </div>

          <div class="form-field">
            <label for="destination" class="form-label">Destination address</label>
            <input
              type="text"
              id="destination"
              class="settings-input"
              placeholder="G... (Stellar public key)"
              autocomplete="off"
              spellcheck="false"
              required
            />
          </div>

          <div class="form-field">
            <label for="memo" class="form-label">Memo (optional)</label>
            <input
              type="text"
              id="memo"
              class="settings-input"
              placeholder="Up to 28 bytes"
              autocomplete="off"
              maxlength="28"
            />
          </div>

          <div class="preset-amounts" role="group" aria-label="Preset amounts">
            <button
              type="button"
              class="btn preset-btn"
              data-amount="1"
              aria-label="Donate 1 XLM"
            >
              1 XLM
            </button>
            <button
              type="button"
              class="btn preset-btn"
              data-amount="5"
              aria-label="Donate 5 XLM"
            >
              5 XLM
            </button>
            <button
              type="button"
              class="btn preset-btn"
              data-amount="10"
              aria-label="Donate 10 XLM"
            >
              10 XLM
            </button>
          </div>

          <div class="custom-donate">
            <div class="input-wrapper">
              <input
                type="number"
                id="amount"
                placeholder="Custom amount"
                min="0.0000001"
                step="0.1"
                aria-label="Custom donation amount in XLM"
              />
              <span class="currency">XLM</span>
            </div>
            <button type="submit" id="donate-submit" class="btn donate-btn" disabled>
              Donate
            </button>
          </div>
          <div id="status-message" class="status-message" role="status" aria-live="polite"></div>
        </form>
      </main>
    </div>
    <script src="dist/popup.js"></script>
  </body>
</html>
